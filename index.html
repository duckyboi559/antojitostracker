<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Antojitos Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="confetti"></canvas>

  <div class="wrap">
    <div class="header">
      <h1>Antojitos Tracker</h1>

      <div class="top-grid">
        <div class="stat"><div class="label">Total Items</div><div class="value" id="totalItems">0</div></div>
        <div class="stat"><div class="label">Total Sales</div><div class="value" id="totalSales">$0</div></div>
        <div class="stat"><div class="label">Cash</div><div class="value" id="cashTotal">$0</div></div>
        <div class="stat"><div class="label">Digital</div><div class="value" id="digitalTotal">$0</div></div>
      </div>

      <div class="controls">
        <button class="btn-white" id="undoBtn">↩ Undo</button>
        <button class="btn-yellow" id="splitHalfBtn">Split 50 / 50</button>
        <button class="btn-blue" id="splitCustomBtn">Split Custom</button>
        <button class="btn-red" id="resetBtn">Reset Day</button>
      </div>

      <div class="payment-boxes">
        <button class="btn-green" id="cashBtn">Next Tap = Cash</button>
        <button class="btn-blue" id="digitalBtn">Next Tap = Digital</button>
        <select id="paymentMode">
          <option value="cash">Default Mode: Cash</option>
          <option value="digital">Default Mode: Digital</option>
        </select>
      </div>

      <div class="week-box">
        <input type="week" id="weekPicker" />
        <button class="btn-pink" id="saveWeekBtn">Save Week</button>
      </div>

      <div class="small-note">The item name is tracked internally. On the cards, only the photo, price, and count show.</div>
    </div>

    <div class="cards" id="cards"></div>

    <div class="section">
      <h2>Weekly Totals</h2>
      <div class="top-grid">
        <div class="stat"><div class="label">Week Sales</div><div class="value" id="weekSales">$0</div></div>
        <div class="stat"><div class="label">Week Items</div><div class="value" id="weekItems">0</div></div>
        <div class="stat"><div class="label">Top Seller</div><div class="value" id="weekTopSeller">—</div></div>
        <div class="stat"><div class="label">Top Seller Qty</div><div class="value" id="weekTopQty">0</div></div>
      </div>
      <div class="weekly-list" id="weeklyBreakdown"></div>
    </div>
  </div>

  <audio id="tapSound" class="hidden-audio" preload="auto">
    <source src="sounds/tap.mp3" type="audio/mpeg" />
  </audio>

  <script src="script.js"></script>
</body>
</html>
