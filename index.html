<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Antojitos Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="confetti"></canvas>

  <div class="wrap">
    <div class="header">
      <div class="logo-row">
        <img src="images/logo.png" alt="Logo" class="top-logo" onerror="this.style.display='none'" />
      </div>

      <h1>Chip Esquite Orders</h1>
      <p class="subtext">Tap an item box, then tap cash or digital to save the order.</p>

      <div class="top-grid">
        <div class="stat">
          <div class="label">Daily Items</div>
          <div class="value" id="totalItems">0</div>
        </div>
        <div class="stat">
          <div class="label">Daily Sales</div>
          <div class="value" id="totalSales">$0</div>
        </div>
        <div class="stat">
          <div class="label">Cash</div>
          <div class="value" id="cashTotal">$0</div>
        </div>
        <div class="stat">
          <div class="label">Digital</div>
          <div class="value" id="digitalTotal">$0</div>
        </div>
      </div>

      <div class="controls">
        <button class="btn-white" id="undoBtn">↩ Undo</button>
        <button class="btn-red" id="resetBtn">Reset Day</button>
        <button class="btn-pink" id="saveWeekBtn">Save Weekly</button>
      </div>

      <div class="pending-box">
        <div class="pending-label">Selected Item</div>
        <div class="pending-value" id="pendingItem">None selected</div>
      </div>

      <div class="payment-boxes">
        <button class="btn-green big-pay" id="cashBtn">Cash</button>
        <button class="btn-blue big-pay" id="digitalBtn">Digital</button>
      </div>
    </div>

    <div class="cards" id="cards"></div>

    <div class="section">
      <h2>Weekly Tracking</h2>

      <div class="top-grid">
        <div class="stat">
          <div class="label">Week Sales</div>
          <div class="value" id="weekSales">$0</div>
        </div>
        <div class="stat">
          <div class="label">Week Items</div>
          <div class="value" id="weekItems">0</div>
        </div>
        <div class="stat">
          <div class="label">Top Seller</div>
          <div class="value" id="weekTopSeller">—</div>
        </div>
        <div class="stat">
          <div class="label">Top Qty</div>
          <div class="value" id="weekTopQty">0</div>
        </div>
      </div>

      <div class="weekly-list" id="weeklyBreakdown"></div>
    </div>
  </div>

  <audio id="tapSound" class="hidden-audio" preload="auto">
    <source src="sounds/tap.mp3" type="audio/mpeg" />
  </audio>

  <script src="script.js"></script>
</body>
</html>
