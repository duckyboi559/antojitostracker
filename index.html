<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AstroSnaxx Order System</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-bg"></div>

  <main class="app-shell">
    <header class="topbar">
      <div class="brand-box center-brand">
        <img src="images/logo.png" alt="AstroSnaxx Logo" class="brand-logo" />
      </div>

      <div class="title-wrap">
        <h1>Order System</h1>
      </div>
    </header>

    <section class="date-card glass-card">
      <div class="date-label">
        <span class="mini-icon">📅</span>
        <span>Select Date:</span>
      </div>
      <input type="date" id="datePicker" />
    </section>

    <section class="glass-card nav-card">
      <div class="top-actions triple-actions">
        <button id="buildTabBtn" class="view-days-btn active-tab-btn" type="button">🧾 Build Order</button>
        <button id="openTabBtn" class="view-days-btn" type="button">📋 Open Orders</button>
        <button id="doneTabBtn" class="view-days-btn" type="button">✅ Handed Out</button>
      </div>
    </section>

    <!-- BUILD ORDER -->
    <section id="buildScreen" class="screen-section active-screen">
      <div class="main-grid">
        <div class="glass-card section-card">
          <div class="section-header">
            <div class="owner-badge">🍿</div>
            <h2>Snacks</h2>
          </div>

          <div class="menu-list" id="snacksMenuList"></div>
        </div>

        <div class="glass-card section-card">
          <div class="section-header">
            <div class="owner-badge">🍋</div>
            <h2>Lemonades</h2>
          </div>

          <div class="menu-list" id="lemonadeMenuList"></div>
        </div>
      </div>

      <section class="glass-card draft-card">
        <div class="draft-top">
          <div class="section-title-row">
            <span class="section-emoji">🛒</span>
            <h3>Current Order</h3>
          </div>

          <div class="draft-top-actions">
            <button id="clearDraftBtn" class="refresh-btn danger-btn" type="button">Clear</button>
          </div>
        </div>

        <div class="draft-controls">
          <div class="field-block">
            <label class="field-label" for="customerNameInput">Customer Name / Note</label>
            <input id="customerNameInput" type="text" placeholder="Optional" />
          </div>

          <div class="field-block">
            <div class="field-label">Payment</div>
            <div class="payment-pick-buttons">
              <button id="draftCashBtn" class="popup-pay-btn active" type="button">Cash</button>
              <button id="draftDigitalBtn" class="popup-pay-btn" type="button">Digital</button>
            </div>
          </div>
        </div>

        <div id="draftItems" class="detail-entries"></div>

        <div class="draft-footer">
          <div class="detail-total-box">
            <div class="small-label">Order Total</div>
            <div class="value" id="draftTotal">$0.00</div>
          </div>

          <button id="sendOrderBtn" class="save-day-btn" type="button">
            <span>🚀</span>
            <span>Send to Open Orders</span>
          </button>
        </div>
      </section>
    </section>

    <!-- OPEN ORDERS -->
    <section id="openScreen" class="screen-section">
      <section class="glass-card history-card">
        <div class="history-top">
          <div class="section-title-row">
            <span class="section-emoji">📋</span>
            <h3>Open Orders</h3>
          </div>
          <div class="small-live-note">Live synced</div>
        </div>

        <div id="openOrdersList" class="order-list"></div>
      </section>
    </section>

    <!-- HANDED OUT -->
    <section id="doneScreen" class="screen-section">
      <section class="glass-card history-card">
        <div class="history-top">
          <div class="section-title-row">
            <span class="section-emoji">✅</span>
            <h3>Handed Out</h3>
          </div>
          <div class="small-live-note">Auto hides after 1 minute</div>
        </div>

        <div id="doneOrdersList" class="order-list"></div>
      </section>
    </section>
  </main>

  <!-- ITEM POPUP -->
  <div id="popupOverlay" class="popup-overlay hidden">
    <div class="popup-card">
      <div class="popup-head">
        <h4 id="popupTitle">Add Item</h4>
        <button id="closePopupBtn" class="close-popup" type="button">✕</button>
      </div>

      <div id="popupStepTitle" class="popup-step-title"></div>
      <div id="popupOptions" class="popup-options"></div>

      <div class="popup-summary" id="popupSummary">Nothing selected yet.</div>

      <div class="popup-actions">
        <button id="popupDoneBtn" class="popup-done-btn" type="button">Add Item</button>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
